<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>親子看天下趨勢週報・成效儀表板</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    /* Brand */
    --pink:       #F03F8E;
    --pink-glow:  rgba(240,63,142,0.18);
    --pink-dim:   rgba(240,63,142,0.12);
    --pink-badge: rgba(240,63,142,0.20);
    --pink-text:  #FF79B8;

    /* Dark surfaces */
    --bg-page:    #0f0f12;
    --bg-card:    #18181f;
    --bg-card2:   #1f1f28;
    --bg-hover:   #25252f;
    --bg-input:   #1a1a22;

    /* Text */
    --text-primary:   #f0eff4;
    --text-secondary: #b0aec0;
    --text-muted:     #6e6c82;

    /* Borders */
    --border:         rgba(255,255,255,0.07);
    --border-strong:  rgba(255,255,255,0.12);

    /* Status */
    --up:    #3dd68c;
    --down:  #ff6b6b;

    /* Chart accent colours */
    --blue:  #5b9cf6;
    --green: #3dd68c;
    --amber: #f5a623;

    --radius: 10px;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
    background: var(--bg-page);
    color: var(--text-primary);
    min-height: 100vh;
  }

  /* HEADER */
  .site-header {
    background: var(--pink);
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 72px;
  }
  .site-header img {
    height: 52px;
    width: auto;
    display: block;
  }

  /* DASHBOARD SUBHEADER */
  .dash-subheader {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 14px 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .dash-subheader h1 {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .dash-subheader span {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* LAYOUT */
  .dash { max-width: 1080px; margin: 0 auto; padding: 2rem 1.5rem 3rem; }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--pink-text);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.75rem;
    margin-top: 2rem;
  }
  .section-label:first-child { margin-top: 0; }

  /* LATEST CARD */
  .latest-card {
    background: var(--bg-card);
    border-radius: 12px;
    border: 1px solid var(--border-strong);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .latest-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 0.75rem;
  }
  .issue-badge {
    background: var(--pink-badge);
    color: var(--pink-text);
    font-size: 12px;
    font-weight: 500;
    padding: 3px 12px;
    border-radius: var(--radius);
    border: 1px solid rgba(240,63,142,0.3);
  }
  .latest-date { font-size: 12px; color: var(--text-muted); }
  .latest-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1.6;
    margin-bottom: 1.25rem;
  }
  .latest-metrics {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
    border-top: 1px solid var(--border);
    padding-top: 1.25rem;
  }
  .metric { text-align: center; }
  .metric-val { font-size: 22px; font-weight: 500; color: var(--text-primary); }
  .metric-lbl { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .metric-cmp { font-size: 11px; margin-top: 3px; }
  .up { color: var(--up); }
  .down { color: var(--down); }
  .neutral { color: var(--text-muted); }

  /* KPI GRID */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .kpi {
    background: var(--bg-card2);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 1rem 1.25rem;
  }
  .kpi-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; letter-spacing: 0.03em; }
  .kpi-value { font-size: 26px; font-weight: 500; color: var(--pink-text); line-height: 1.1; }
  .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .kpi-sub.up { color: var(--up); }
  .kpi-sub.down { color: var(--down); }

  /* CHARTS */
  .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 1.5rem; }
  .chart-card {
    background: var(--bg-card);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 1.25rem;
  }
  .chart-wide {
    background: var(--bg-card);
    border-radius: 12px;
    border: 1px solid var(--border);
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }
  .chart-title { font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 0.75rem; }
  .legend { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--text-muted); margin-bottom: 10px; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }


  /* TOP 5 */
  .top5-card {
    background: var(--bg-card);
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 1.5rem;
    overflow: hidden;
  }
  .top5-row {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }
  .top5-row:hover { background: var(--bg-hover); }
  .top5-row:last-child { border-bottom: none; }
  .top5-rank {
    font-size: 22px;
    width: 36px;
    flex-shrink: 0;
    text-align: center;
    line-height: 1.3;
  }
  .top5-main { flex: 1; min-width: 0; }
  .top5-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .top5-date { font-size: 12px; color: var(--text-muted); }
  .top5-rate {
    font-size: 15px;
    font-weight: 500;
    color: var(--pink-text);
    margin-left: auto;
  }
  .top5-title {
    font-size: 14px;
    font-weight: 400;
    color: var(--text-primary);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .top5-bar-wrap {
    background: rgba(255,255,255,0.07);
    border-radius: 4px;
    height: 3px;
    margin-bottom: 6px;
    overflow: hidden;
  }
  .top5-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--pink) 0%, #ff79b8 100%);
    border-radius: 4px;
    transition: width 0.4s ease;
  }
  .top5-stats { font-size: 12px; color: var(--text-muted); }

  /* HISTORY ACCORDION */
  .history-search-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }
  .history-search-bar input[type="text"] {
    flex: 1;
    min-width: 200px;
    height: 36px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 0 12px;
    font-size: 13px;
    background: var(--bg-input);
    color: var(--text-primary);
    outline: none;
  }
  .history-search-bar input[type="text"]::placeholder { color: var(--text-muted); }
  .history-search-bar input[type="text"]:focus { border-color: var(--pink); box-shadow: 0 0 0 3px var(--pink-glow); }
  .history-search-count { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
  .acc-group {
    background: var(--bg-card);
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .acc-group.open { border-color: var(--border-strong); }
  .acc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 1.25rem;
    cursor: pointer;
    user-select: none;
    gap: 12px;
    background: transparent;
    transition: background 0.12s;
  }
  .acc-header:hover { background: var(--bg-hover); }
  .acc-group.open .acc-header { background: var(--bg-card2); }
  .acc-header-left { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .acc-range {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
  }
  .acc-meta { font-size: 12px; color: var(--text-muted); }
  .acc-avg-badge {
    background: var(--pink-badge);
    color: var(--pink-text);
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid rgba(240,63,142,0.25);
  }
  .acc-chevron {
    font-size: 11px;
    color: var(--text-muted);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .acc-group.open .acc-chevron { transform: rotate(180deg); color: var(--pink-text); }
  .acc-body {
    display: none;
    border-top: 1px solid var(--border);
    overflow-x: auto;
  }
  .acc-group.open .acc-body { display: block; }
  table.hist {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    table-layout: fixed;
  }
  table.hist th {
    text-align: left;
    padding: 8px 12px;
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    background: var(--bg-card2);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    text-transform: uppercase;
  }
  table.hist td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    color: var(--text-primary);
  }
  table.hist tr:last-child td { border-bottom: none; }
  table.hist tr:hover td { background: var(--bg-hover); }
  .col-no   { width: 68px; }
  .col-date { width: 92px; }
  .col-title { }
  .col-sent { width: 78px; text-align: right; }
  .col-open { width: 78px; text-align: right; }
  .col-or   { width: 74px; text-align: right; }
  .col-cr   { width: 74px; text-align: right; }
  .col-ocr  { width: 74px; text-align: right; }
  td.num { text-align: right; color: var(--text-secondary); }
  td.rate { text-align: right; }
  .rate-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .rate-hi  { background: rgba(61,214,140,0.15); color: #3dd68c; }
  .rate-mid { background: rgba(245,166,35,0.15); color: #f5a623; }
  .rate-lo  { background: rgba(255,107,107,0.15); color: #ff6b6b; }
  .issue-no {
    display: inline-block;
    background: var(--pink-badge);
    color: var(--pink-text);
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
    border: 1px solid rgba(240,63,142,0.25);
  }
  .title-cell { color: var(--text-secondary); line-height: 1.4; }
  .no-results { text-align: center; padding: 2.5rem; color: var(--text-muted); font-size: 13px; }

  /* FOOTER */
  .dash-footer {
    text-align: center;
    padding: 2rem 0 1rem;
    font-size: 12px;
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    margin-top: 1rem;
  }

  @media (max-width: 680px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .charts-row { grid-template-columns: 1fr; }
    .latest-metrics { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .dash { padding: 1rem; }
    .acc-header-left { gap: 6px; }
    .col-ocr, .col-open { display: none; }
  }
</style>
</head>

function deltaHtml(cur, prevVal, suffix='%') {
  const d = (cur - prevVal);
  const sign = d > 0 ? '+' : '';
  const cls = d > 0 ? 'up' : d < 0 ? 'down' : 'neutral';
  return '<span class="metric-cmp ' + cls + '">' + sign + d.toFixed(2) + suffix + ' vs 上期</span>';
}
function vsAvgHtml(cur, avg, suffix='%') {
  const d = (cur - avg);
  const sign = d > 0 ? '+' : '';
  const cls = d > 0 ? 'up' : d < 0 ? 'down' : 'neutral';
  return '<span class="metric-cmp ' + cls + '">' + sign + d.toFixed(2) + suffix + ' vs 均值</span>';
}

function rateBadge(v, lo, hi) {
  const cls = v >= hi ? 'rate-hi' : v >= lo ? 'rate-mid' : 'rate-lo';
  return '<span class="rate-badge ' + cls + '">' + v.toFixed(2) + '%</span>';
}

function tableRows(rows) {
  if (rows.length === 0) return '<tr><td colspan="8" class="no-results">找不到符合條件的期次</td></tr>';
  return rows.map(d => {
    const title = titleMap[d.no] || '—';
    return '<tr>' +
      '<td><span class="issue-no">' + d.no + '</span></td>' +
      '<td style="color:var(--text-muted);font-size:12px;white-space:nowrap">' + d.date + '</td>' +
      '<td class="title-cell">' + title + '</td>' +
      '<td class="num">' + d.sent.toLocaleString() + '</td>' +
      '<td class="num">' + d.open.toLocaleString() + '</td>' +
      '<td class="rate">' + rateBadge(d.openRate, 42, 50) + '</td>' +
      '<td class="rate">' + rateBadge(d.clickRate, 3, 7) + '</td>' +
      '<td class="rate">' + rateBadge(d.ocRate, 3, 6) + '</td>' +
    '</tr>';
  }).join('');
}

const TABLE_HEAD = '<table class="hist"><thead><tr>' +
  '<th class="col-no">期號</th>' +
  '<th class="col-date">日期</th>' +
  '<th class="col-title">開信主旨</th>' +
  '<th class="col-sent" style="text-align:right">發送數</th>' +
  '<th class="col-open" style="text-align:right">開信數</th>' +
  '<th class="col-or" style="text-align:right">開信率</th>' +
  '<th class="col-cr" style="text-align:right">點擊率</th>' +
  '<th class="col-ocr" style="text-align:right">開點率</th>' +
  '</tr></thead><tbody>';

function renderAccordion() {
  const q = (document.getElementById('histSearch').value || '').toLowerCase();
  const sorted = [...allData].sort((a,b) => {
    const da = a.date.replace(/\//g,''), db = b.date.replace(/\//g,'');
    return db < da ? -1 : db > da ? 1 : 0;
  });
  const filtered = sorted.filter(d => {
    const title = (titleMap[d.no] || '').toLowerCase();
    return title.includes(q) || d.no.toLowerCase().includes(q) || d.date.includes(q);
  });

  document.getElementById('histCount').textContent = filtered.length + ' / ' + allData.length + ' 期';
  const wrap = document.getElementById('accordionWrap');

  if (filtered.length === 0) {
    wrap.innerHTML = '<div style="text-align:center;padding:2.5rem;color:var(--text-muted);font-size:13px;background:var(--gray-0);border-radius:12px;border:0.5px solid var(--border)">找不到符合條件的期次</div>';
    return;
  }

  // Group into chunks of 10
  const groups = [];
  for (let i = 0; i < filtered.length; i += 10) {
    groups.push(filtered.slice(i, i + 10));
  }

  const isSearching = q.length > 0;

  wrap.innerHTML = groups.map((grp, gi) => {
    const first = grp[0], last = grp[grp.length - 1];
    const label = first.no + (grp.length > 1 ? ' — ' + last.no : '');
    const dateRange = first.date + (grp.length > 1 ? ' ～ ' + last.date : '');
    const avgOR = (grp.reduce((s,d)=>s+d.openRate,0)/grp.length).toFixed(1);
    const isOpen = isSearching || gi === 0;
    return '<div class="acc-group' + (isOpen ? ' open' : '') + '" id="acc-' + gi + '">' +
      '<div class="acc-header" onclick="toggleAcc(' + gi + ')">' +
        '<div class="acc-header-left">' +
          '<span class="acc-range">' + label + '</span>' +
          '<span class="acc-meta">' + dateRange + '・共 ' + grp.length + ' 期</span>' +
          '<span class="acc-avg-badge">平均開信率 ' + avgOR + '%</span>' +
        '</div>' +
        '<span class="acc-chevron">▼</span>' +
      '</div>' +
      '<div class="acc-body">' +
        TABLE_HEAD + tableRows(grp) + '</tbody></table>' +
      '</div>' +
    '</div>';
  }).join('');
}

function toggleAcc(gi) {
  const el = document.getElementById('acc-' + gi);
  el.classList.toggle('open');
}

renderAccordion();

const medals = ['🥇','🥈','🥉','④','⑤'];
document.getElementById('top5Card').innerHTML = top5.map((d,i) => {
  const title = titleMap[d.no] || '—';
  const barW = Math.round((d.openRate / top5[0].openRate) * 100);
  return '<div class="top5-row">' +
    '<div class="top5-rank">' + medals[i] + '</div>' +
    '<div class="top5-main">' +
      '<div class="top5-header">' +
        '<span class="issue-no">' + d.no + '</span>' +
        '<span class="top5-date">' + d.date + '</span>' +
        '<span class="top5-rate">' + d.openRate.toFixed(2) + '%</span>' +
      '</div>' +
      '<div class="top5-title">' + title + '</div>' +
      '<div class="top5-bar-wrap"><div class="top5-bar" style="width:' + barW + '%"></div></div>' +
      '<div class="top5-stats">開信 ' + d.open.toLocaleString() + '人・點擊率 ' + d.clickRate.toFixed(2) + '%・開點率 ' + d.ocRate.toFixed(2) + '%</div>' +
    '</div>' +
  '</div>';
}).join('');
